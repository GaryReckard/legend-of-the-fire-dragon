<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5b0e0e" />
      <stop offset="60%" stop-color="#2a0606" />
      <stop offset="100%" stop-color="#0a0000" />
    </radialGradient>
    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" />
      <stop offset="100%" stop-color="#ff3322" />
    </radialGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)" />
  <!-- dragon silhouette -->
  <g fill="#8a1d1d" stroke="#3a0606" stroke-width="4">
    <!-- body -->
    <ellipse cx="256" cy="280" rx="160" ry="80" />
    <!-- belly -->
    <ellipse cx="256" cy="310" rx="120" ry="40" fill="#d8c084" />
    <!-- head -->
    <ellipse cx="120" cy="220" rx="68" ry="50" />
    <!-- jaw -->
    <rect x="48" y="240" width="64" height="20" fill="#5b0e0e" />
    <!-- teeth -->
    <g fill="#fff" stroke="none">
      <rect x="56" y="240" width="6" height="14" />
      <rect x="70" y="240" width="6" height="14" />
      <rect x="84" y="240" width="6" height="14" />
      <rect x="98" y="240" width="6" height="14" />
    </g>
    <!-- eye -->
    <circle cx="106" cy="205" r="14" fill="url(#eye)" stroke="none" />
    <circle cx="110" cy="205" r="5" fill="#000" stroke="none" />
    <!-- horns -->
    <polygon points="100,160 110,178 90,178" />
    <polygon points="130,160 140,178 120,178" />
    <!-- wings -->
    <polygon points="260,210 360,100 380,210" />
    <polygon points="300,220 400,160 380,250" />
    <!-- tail -->
    <polygon points="412,280 470,260 470,300 412,310" />
    <!-- claws -->
    <polygon points="200,360 200,400 180,400 170,360" />
    <polygon points="280,360 280,400 260,400 250,360" />
  </g>
  <!-- embers -->
  <g fill="#ffaa33">
    <circle cx="60"  cy="80"  r="4" />
    <circle cx="430" cy="100" r="3" />
    <circle cx="80"  cy="430" r="3" />
    <circle cx="440" cy="420" r="4" />
    <circle cx="240" cy="60"  r="3" />
  </g>
</svg>
