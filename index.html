<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Legend of the Dragon</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a12;
      color: #eee;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100%;
    }
    #app {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      box-shadow: 0 0 32px rgba(255, 80, 0, 0.25);
      border: 2px solid #444;
    }
    #legend {
      position: fixed;
      bottom: 6px;
      left: 8px;
      font-size: 11px;
      color: #888;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" width="800" height="600"></canvas>
  </div>
  <div id="legend">WASD/Arrows · J sword · K bow · L shield · E action · I inv · C craft · F1 debug</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
